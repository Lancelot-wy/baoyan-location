version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: baoyan_postgres
    environment:
      POSTGRES_USER: baoyan
      POSTGRES_PASSWORD: baoyan_secret
      POSTGRES_DB: baoyan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baoyan -d baoyan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: baoyan_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baoyan_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://baoyan:baoyan_secret@postgres:5432/baoyan_db
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-chat-v3-0324}
      UPLOAD_DIR: /app/data/uploads
      RAW_DIR: /app/data/raw
      PROCESSED_DIR: /app/data/processed
      APP_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baoyan_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://baoyan:baoyan_secret@postgres:5432/baoyan_db
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-chat-v3-0324}
      UPLOAD_DIR: /app/data/uploads
      RAW_DIR: /app/data/raw
      PROCESSED_DIR: /app/data/processed
      APP_ENV: development
    volumes:
      - ./data:/app/data
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: baoyan_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
